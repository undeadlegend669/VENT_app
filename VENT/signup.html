<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VENT | Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="container">
        <a class="brand" href="index.html">
          <span class="brand-badge">🌱</span>
          <span>VENT</span>
        </a>
        <nav class="nav-links desktop-links">
          <a href="index.html">Home</a>
          <a href="login.html">Login</a>
          <a href="about.html">About</a>
        </nav>
        <div class="nav-actions">
          <button class="theme-toggle" type="button">🌙</button>
        </div>
      </div>
    </header>

    <main class="auth-shell">
      <section class="form-card">
        <h1>Create your VENT account</h1>
        <p class="helper">Choose whether you are joining as an individual or a company, and whether you are a farmer or buyer.</p>
        <form>
          <div class="form-grid">
            <div>
              <label for="accountType">Account Type</label>
              <select id="accountType">
                <option>Individual</option>
                <option>Company</option>
              </select>
            </div>
            <div>
              <label for="role">Role</label>
              <select id="role">
                <option>Farmer</option>
                <option>Buyer</option>
              </select>
            </div>
            <div class="full">
              <label for="name">Full Name or Company Name</label>
              <input id="name" type="text" placeholder="Enter your name or company" />
            </div>
            <div>
              <label for="email">Email</label>
              <input id="email" type="email" placeholder="you@example.com" />
            </div>
            <div>
              <label for="phone">Phone</label>
              <input id="phone" type="tel" placeholder="0800 000 0000" />
            </div>
            <div class="full">
              <label for="location">Location</label>
              <input id="location" type="text" placeholder="City or state" />
            </div>
            <div>
              <label for="password">Password</label>
              <input id="password" type="password" placeholder="Create password" />
            </div>
            <div>
              <label for="confirmPassword">Confirm Password</label>
              <input id="confirmPassword" type="password" placeholder="Repeat password" />
            </div>
            <div class="full">
              <label for="bio">Bio or Company Description</label>
              <textarea id="bio" placeholder="Tell buyers or partners what you offer"></textarea>
            </div>
            <div class="full">
              <button class="btn btn-primary" type="button">Create account</button>
            </div>
          </div>
        </form>
      </section>
    </main>

    <script src="js/script.js"></script>
  </body>
</html>
