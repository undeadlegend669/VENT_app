<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VENT | Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="container">
        <a class="brand" href="index.html">
          <span class="brand-badge">🌱</span>
          <span>VENT</span>
        </a>
        <nav class="nav-links desktop-links">
          <a href="index.html">Home</a>
          <a href="warehouses.html">Warehouses</a>
          <a href="logistics.html">Logistics</a>
        </nav>
        <div class="nav-actions">
          <button class="theme-toggle" type="button">🌙</button>
        </div>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <div class="section-head">
          <h1>Search VENT</h1>
          <a href="premium.html">Premium filters</a>
        </div>
        <section class="panel search-panel">
          <form>
            <div class="input-row">
              <input type="text" placeholder="Search by username, company, product" />
              <select>
                <option>Farmers</option>
                <option>Buyers</option>
                <option>Companies</option>
              </select>
            </div>
            <div class="input-row">
              <select>
                <option>Premium only</option>
                <option>Highest rated</option>
                <option>Recently joined</option>
                <option>Newest posts</option>
              </select>
              <input type="text" placeholder="Location" />
            </div>
            <button class="btn btn-primary" type="button">Apply filters</button>
          </form>
        </section>

        <div class="partner-grid" style="margin-top: 1.2rem;">
          <article class="partner-card">
            <h3>Grace Farms</h3>
            <p>Premium • Tomatoes • Ibadan</p>
            <div class="pill-row">
              <span class="pill">Verified</span>
              <span class="pill">Top Rated</span>
            </div>
          </article>
          <article class="partner-card">
            <h3>Harvest Hub</h3>
            <p>Buyer • Wholesale • Abuja</p>
          </article>
          <article class="partner-card">
            <h3>Green Vault</h3>
            <p>Warehouse • 2,500 tonnes • Lagos</p>
          </article>
          <article class="partner-card">
            <h3>Swift Haul</h3>
            <p>Logistics • 18 trucks • Port Harcourt</p>
          </article>
        </div>
      </div>
    </main>

    <script src="js/script.js"></script>
  </body>
</html>
