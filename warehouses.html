<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VENT | Warehouses</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="container">
        <a class="brand" href="index.html">
          <span class="brand-badge">🌱</span>
          <span>VENT</span>
        </a>
        <nav class="nav-links desktop-links">
          <a href="index.html">Home</a>
          <a href="logistics.html">Logistics</a>
          <a href="search.html">Search</a>
        </nav>
        <div class="nav-actions">
          <button class="theme-toggle" type="button">🌙</button>
        </div>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <div class="section-head">
          <h1>Warehouse partners</h1>
          <a href="premium.html">Premium access</a>
        </div>
        <div class="partner-grid">
          <article class="partner-card">
            <img src="images/warehouse-visual.svg" alt="Warehouse partner" />
            <h3>Green Vault</h3>
            <p>Capacity: 2,500 tonnes • Lagos</p>
            <div class="pill-row">
              <span class="pill">Cold Storage</span>
              <span class="pill">Available</span>
            </div>
            <div class="post-actions">
              <a class="action-btn" href="https://wa.me/2348000000000">WhatsApp</a>
              <a class="action-btn" href="mailto:greenvault@vent.app">Email</a>
            </div>
          </article>
          <article class="partner-card">
            <img src="images/warehouse-visual.svg" alt="Warehouse partner" />
            <h3>Fresh Hold</h3>
            <p>Capacity: 1,100 tonnes • Abuja</p>
            <div class="pill-row">
              <span class="pill">Dry Storage</span>
              <span class="pill">Available</span>
            </div>
          </article>
        </div>
      </div>
    </main>

    <script src="js/script.js"></script>
  </body>
</html>
